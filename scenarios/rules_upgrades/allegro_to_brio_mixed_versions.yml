Name: Rules Upgrade Allegro To Brio Mixed Versions Forks

Description: >-
  Upgrades network rules from Allegro to Brio with mixed validator versions.
  The sonic:v2.1.6 validator forks after Brio activation and is treated as
  expected failing behavior, while the sonic:local validator keeps the network
  online via stake majority. Brio-specific large contract load executes after
  enabling Brio.

InitialNetworkRules:
  Upgrades:
    Sonic: true
    Allegro: true
    Brio: false
  Epochs:
    MaxEpochDuration: 20s

Scenario:
  - startNode: validator-local
    type: validator
    imageName: "sonic:local"
    stake: 7000000

  - startNode: validator-v216
    type: validator
    imageName: "sonic:v2.1.6"
    stake: 2000000
    failing: true

  - runApp: baseline-counter
    type: counter
    users: 20
    rate:
      constant: 20

  - waitFor: 20s

  - updateRules:
      Upgrades:
        Brio: true

  - waitForEpoch

  - runApp: brio-large-contract
    type: largecontract
    users: 10
    rate:
      constant: 6

  - waitFor: 40s
