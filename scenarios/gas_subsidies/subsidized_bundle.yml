name: test subsidized bundle

duration: 50

network_rules:
  genesis:
    Upgrades:
      Allegro: true
      Brio: true
      GasSubsidies: true
      TransactionBundles: true

validators:
  - name: local
    instances: 2
    imagename: "sonic:local" # local submodule, used to test different versions

applications:

  - name: background
    type: counter
    start: 10
    end: 45
    users: 20
    rate:
      constant: 10

  - name: subsidizedbundle
    type: subsidizedbundle
    start: 15
    end: 40
    users: 10
    rate:
      slope:
        start: 5
        increment: 2
