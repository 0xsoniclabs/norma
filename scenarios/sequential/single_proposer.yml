Name: Single Block Proposer Test

InitialNetworkRules:
  Upgrades:
    Sonic: true
    Allegro: true
    GasSubsidies: true
    Brio: false

Scenario:
  - startNode: validator
    type: validator
    instances: 5 # ensure the network continues after failures of other nodes

  - waitFor: 5s

  - startNode: validator-old
    type: validator
    imageName: "sonic:v2.1.6"
    failing: true  # this node should stop working after the hardfork

  - waitFor: 5s

  - updateRules:
      Upgrades:
        Brio: true  # hardfork enabled

  - waitFor: 5s

  - startNode: validator-old-after-upgrade
    type: validator
    imageName: "sonic:v2.1.6"
    failing: true  # this node should not be able to sync when Brio is enabled
