# Summary: Upgrade network rules from Sonic to Allegro with mixed validator versions.
# Expected outcomes:
# - Validators on sonic:v2.1.5, sonic:v2.1.6, and sonic:local stay online across the Allegro activation.
# - Baseline load continues before and after the rule upgrade.
# - Allegro-specific BLS12-Add load runs successfully after the upgrade.

Name: Rules Upgrade Sonic To Allegro Mixed Versions

InitialNetworkRules:
  Upgrades:
    Sonic: true
    Allegro: false
    Brio: false
  Epochs:
    MaxEpochDuration: 20s

Scenario:
  - startNode: validator-local
    type: validator
    imageName: "sonic:local"
    stake: 7000000

  - startNode: validator-v216
    type: validator
    imageName: "sonic:v2.1.6"
    stake: 2000000

  - startNode: validator-v215
    type: validator
    imageName: "sonic:v2.1.5"
    stake: 1000000

  - runApp: baseline-counter
    type: counter
    users: 20
    rate:
      constant: 20

  - waitFor: 20s

  - updateRules:
      Upgrades:
        Allegro: true

  - waitForEpoch

  - runApp: allegro-bls12add
    type: bls12add
    users: 10
    rate:
      constant: 10

  - waitFor: 40s
