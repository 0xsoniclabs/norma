# Summary: Change gas-related network rule values while diverse load is active.
# Expected outcomes:
# - Network continues processing transactions after MAX_BLOCK_GAS and MAX_EPOCH_GAS updates.
# - Brio-enabled large contract load keeps running under the updated gas limits.
# - Mixed load (counter, uniswap, largecontract) remains active through the rule change.

Name: Rules Update Gas Values With Load

InitialNetworkRules:
  UPGRADES_SONIC: true
  UPGRADES_ALLEGRO: true
  UPGRADES_BRIO: true
  MAX_BLOCK_GAS: 30000000
  MAX_EPOCH_GAS: 1000000000

Scenario:
  - startNode: validator-main
    type: validator
    imageName: "sonic:local"
    stake: 10000000

  - runApp: counter-load
    type: counter
    users: 20
    rate:
      constant: 15

  - runApp: uniswap-load
    type: uniswap
    users: 10
    rate:
      constant: 5

  - runApp: large-contract-load
    type: largecontract
    users: 8
    rate:
      constant: 4

  - waitFor: 20s

  - updateRules:
      MAX_BLOCK_GAS: 25000000
      MAX_EPOCH_GAS: 800000000
      MIN_BASE_FEE: 1000000000

  - waitFor: 40s
