Name: Start and Stop Nodes Test

Scenario:
  - startNode: background-validator 
    type: validator
    instances: 2

  - runApp: normal
    type: counter
    users: 10
    rate:
      constant: 10

  - waitForEpoch

  - startNode: validator-1
    type: validator

  - waitForEpoch

  - startNode: validator-2
    type: validator

  - waitForEpoch

  - stopNode: validator-1

  - waitForEpoch

  - startNode: validator-1 # same identifier => rejoin
    type: validator

  - advanceEpoch

  - advanceEpoch

  - undelegate:
    - node: validator-2

  - stopNode: validator-2
  