Name: Subsidies Test
Description: >-
  Runs a gas subsidies load application to verify
  subsidized transactions are processed correctly.

InitialNetworkRules:
  Upgrades:
    Allegro: true
    GasSubsidies: true
  Epochs:
    MaxEpochDuration: 10s

Scenario:
  - startNode: validator-0
    type: validator

  - runApp: subsidies
    type: subsidies
    users: 10
    rate:
      constant: 10

  - waitFor: 10s
  