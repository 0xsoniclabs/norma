Name: Rejoin With Volume Test
Description: >-
  Tests that a validator can be stopped, upgraded, and
  rejoined using a persistent data volume.

Scenario:
  - startNode: stable-validator
    type: validator
    instances: 3

  - waitForEpoch

  - startNode: migrating-validator
    type: validator
    imageName: "sonic:v2.1.6"
    dataVolume: validator-data

  - waitForEpoch

  - waitFor: 15s

  - stopNode: migrating-validator

  - startNode: migrating-validator
    type: validator
    imageName: "sonic:local"
    dataVolume: validator-data

  - waitForEpoch
