Name: Rejoin With Volume Test

Scenario:
  - startNode: stable-validator
    type: validator
    instances: 3

  - waitForEpoch

  - startNode: migrating-validator
    type: validator
    imageName: "sonic:v2.1.6"
    dataVolume: validator-data

  - waitForEpoch

  - waitFor: 15s

  - stopNode: migrating-validator

  - startNode: migrating-validator
    type: validator
    imageName: "sonic:local"
    dataVolume: validator-data

  - waitForEpoch
