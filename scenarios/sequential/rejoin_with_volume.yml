Name: Rejoin With Volume Test

Scenario:
  - startNode: validator-0
    type: validator
    instances: 3

  - waitForEpoch

  - startNode: validator-1
    type: validator
    imageName: "sonic:v2.1.6"
    dataVolume: validator-1-data

  - waitForEpoch

  - stopNode: validator-1

  - startNode: validator-1
    type: validator
    imageName: "sonic:local"
    dataVolume: validator-1-data

  - waitForEpoch
