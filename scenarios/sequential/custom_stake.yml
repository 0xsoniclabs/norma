# This scenario tests validators with custom stake values.
# Validators with different stakes receive proportional voting weight
# in the consensus, reflected in the stake distribution shown in progress logs.

Name: Custom Stake Test
Description: >-
  Tests validators with different stake amounts and
  verifies partial and full undelegation.

Scenario:
  - startNode: heavy
    type: validator
    stake: 10000000

  - startNode: medium
    type: validator
    stake: 5000000

  - startNode: light
    type: validator
    stake: 1000000
    instances: 2

  - waitFor: 10s

  - advanceEpoch

  - undelegate: medium

  - stopNode: medium

  - waitFor: 10s
  
  - undelegate: light

  - stopNode: light
  