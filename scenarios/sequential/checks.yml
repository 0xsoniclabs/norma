# This scenario demonstrates all available check functions.

Name: All Checks Test

InitialNetworkRules:
  Epochs:
    MaxEpochDuration: 10s

Scenario:
  - startNode: validator
    type: validator
    instances: 3

  - runApp: load
    type: counter
    users: 50
    rate:
      constant: 20

  - waitFor: 15s

  # Run health checks: blocks produced, hash agreement,
  # height tolerance, and gas rate ceiling.
  - checks:
      - checkBlocksProduced:
        tolerance: 10
      - checkBlockGasRate:
        ceiling: 1000000000000000
      - checkBlockHashes
      - checkBlockHeights:
        tolerance: 5

  - stopApp: load

  # Stop all validators so blocks genuinely halt.
  - stopNode: validator

  - waitFor: 15s

  # Verify blocks have halted (monitoring data is stale after stopNode).
  - checks:
      - checkBlocksHalted
