Name: ERC20 Load Test
Description: >-
  Runs the erc20 load generator against a single validator to verify ERC-20 token transfers are processed correctly.

Scenario:
  - startNode: validator
    type: validator

  - runApp: erc20
    type: erc20
    users: 10
    rate:
      constant: 10

  - waitFor: 30s

  - stopApp: erc20
