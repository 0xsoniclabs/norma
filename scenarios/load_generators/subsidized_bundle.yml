Name: Subsidized Bundle Load Test
Description: >-
  Runs the subsidizedbundle load generator against a single validator to verify gas-subsidized transaction bundles are processed correctly.

InitialNetworkRules:
  Upgrades:
    Sonic: true
    Allegro: true
    Brio: true
    GasSubsidies: true
    TransactionBundles: true

Scenario:
  - startNode: validator
    type: validator

  - runApp: subsidizedbundle
    type: subsidizedbundle
    users: 10
    rate:
      constant: 10

  - waitFor: 30s

  - stopApp: subsidizedbundle
