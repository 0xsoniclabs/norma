Name: Transient Storage Load Test
Description: >-
  Runs the transient load generator against a single validator to verify transient-storage (EIP-1153) transactions are processed correctly.

Scenario:
  - startNode: validator
    type: validator

  - runApp: transient
    type: transient
    users: 10
    rate:
      constant: 10

  - waitFor: 30s

  - stopApp: transient
