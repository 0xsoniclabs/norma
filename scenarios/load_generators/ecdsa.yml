Name: ECDSA Load Test
Description: >-
  Runs the ecdsa load generator against a single validator to verify ecrecover precompile transactions are processed correctly.

InitialNetworkRules:
  Upgrades:
    Sonic: true
    Allegro: true
    Brio: true

Scenario:
  - startNode: validator
    type: validator

  - runApp: ecdsa
    type: ecdsa
    users: 10
    rate:
      constant: 10

  - waitFor: 30s

  - stopApp: ecdsa
