Name: Consensus Chain From Genesis
Description: >-
  Starts a network of three validators already running the Sonic consensus
  engine as the canonical block producer from block one: the RunConsensusChain
  upgrade builds the engine and the useConsensusChain flag is seeded on at
  genesis, so there is no legacy phase and no hand-over. The validators must
  agree on the blocks they produce.

  Every node in a consensus-chain network runs the same engine — no mixed
  client versions. End checks are disabled because they advance epochs, which
  the consensus engine does not support yet; block agreement is checked
  explicitly instead.

DisableEndChecks: true

InitialNetworkRules:
  Upgrades:
    RunConsensusChain: true
  UseConsensusChain: true

Scenario:
  - startNode: validator
    type: validator
    instances: 3

  - waitFor: 30s

  - checks:
      - consensusChainActive
      - blockHashes
      - blockHeights
