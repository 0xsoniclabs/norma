# This scenario validates live network rule updates across Sonic, Allegro, and Brio
# with mixed validator versions (sonic:v2.1.6 and sonic:local).
# Expectations:
# - The network remains live under steady load while rules are updated.
# - In each phase (Sonic, Allegro, Brio), MAX_BLOCK_GAS, MAX_EPOCH_GAS,
#   and MAX_EPOCH_DURATION are changed to different values.
# - An epoch is advanced after each rule-change step to apply and exercise updates.
name: Rules Updates Across Sonic Allegro Brio

duration: 120

validators:
  - name: validator-local
    imagename: "sonic:local"
    instances: 3

  - name: validator-v216
    imagename: "sonic:v2.1.6"
    failing: true


network_rules:
  genesis:
    UPGRADES_SONIC: true
    UPGRADES_ALLEGRO: false
    UPGRADES_BRIO: false
    MAX_BLOCK_GAS: 20500000000
    MAX_EPOCH_GAS: 1500000000000
    MAX_EPOCH_DURATION: 15s
  updates:
    # Sonic phase tuning.
    - time: 20
      rules:
        MAX_BLOCK_GAS: 20500000010
        MAX_EPOCH_GAS: 1500000000100
        MAX_EPOCH_DURATION: 14s

    # Switch to Allegro, then retune gas and epoch limits.
    - time: 40
      rules:
        UPGRADES_ALLEGRO: true
    - time: 60
      rules:
        MAX_BLOCK_GAS: 20500000020
        MAX_EPOCH_GAS: 1500000000200
        MAX_EPOCH_DURATION: 12s

    # Switch to Brio, then retune again with different values.
    - time: 80
      rules:
        UPGRADES_BRIO: true
    - time: 100
      rules:
        MAX_BLOCK_GAS: 20500000030
        MAX_EPOCH_GAS: 1500000000300
        MAX_EPOCH_DURATION: 10s

advance_epoch:
  - time: 30
  - time: 50
  - time: 70
  - time: 90
  - time: 110


applications:
  - name: steady-load
    type: counter
    start: 0
    users: 20
    rate:
      constant: 8

  # Brio enables large contracts
  - name: largecontract
    type: largecontract
    start: 91
    users: 10
    rate:
      constant: 2