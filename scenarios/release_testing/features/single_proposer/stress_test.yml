Name: Release Features Single Proposer Stress Test

Description: >-
  Stress-tests single proposer mode under heavy transaction load
  with multiple validators. Block production remains consistent and
  no hash divergence occurs under stress.

InitialNetworkRules:
  Upgrades:
    Sonic: true
    Allegro: true
    SingleProposerBlockFormation: true

Scenario:
  - startNode: validator
    type: validator
    imageName: "sonic:local"
    instances: 5

  - runApp: heavy-load
    type: counter
    users: 1000
    rate:
      constant: 500

  - waitFor: 60s

  - checks:
      - blocksProduced:
          tolerance: 10
      - blockHashes
      - blockHeights:
          tolerance: 5

  - waitFor: 60s

  - checks:
      - blocksProduced:
          tolerance: 10
      - blockHashes
      - blockHeights:
          tolerance: 5

  - stopApp: heavy-load
