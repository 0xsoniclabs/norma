Name: Release Features Single Proposer Network Recovers From Blackout

Description: >-
  Verifies that a network in single proposer mode recovers after
  a blackout caused by stopping enough validators to halt consensus.
  Restarting validators restores block production.

DisableEndChecks: true

InitialNetworkRules:
  Upgrades:
    Sonic: true
    Allegro: true
    SingleProposerBlockFormation: true

Scenario:
  - startNode: validator-1
    type: validator
    dataVolume: validator-1-data

  - startNode: validator-2
    type: validator
    dataVolume: validator-2-data

  - startNode: validator-3
    type: validator
    dataVolume: validator-3-data

  - startNode: validator-4
    type: validator
    dataVolume: validator-4-data

  - startNode: validator-5
    type: validator
    dataVolume: validator-5-data

  - runApp: load
    type: counter
    users: 20
    rate:
      constant: 10

  - waitFor: 15s

  - checks:
      - blocksProduced:
          tolerance: 10

  # Stop validators to break quorum and halt the network.
  - stopNode: validator-3
  - stopNode: validator-4
  - stopNode: validator-5

  - waitFor: 60s

  - checks:
      - blocksHalted

  # Restart stopped validators to restore the network.
  - startNode: validator-4
    type: validator
    dataVolume: validator-4-data

  - startNode: validator-5
    type: validator
    dataVolume: validator-5-data

  - waitFor: 20s

  - checks:
      - blocksProduced:
          tolerance: 10
      - blockHashes
      - blockHeights:
          tolerance: 5

  - stopApp: load
