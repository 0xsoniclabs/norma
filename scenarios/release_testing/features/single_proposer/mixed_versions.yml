# This scenario verifies that single proposer mode works correctly with
# validators running different Sonic versions.
# Expected outcomes:
# - Validators with different image versions form a network.
# - Single proposer mode is activated via updateRules.
# - Block production continues across all version combinations.
# - Block hashes and heights remain consistent across nodes.

Name: Release Features Single Proposer Mixed Versions

InitialNetworkRules:
  Upgrades:
    Sonic: true
    Allegro: true
    SingleProposerBlockFormation: false
  Epochs:
    MaxEpochDuration: 1000s

Scenario:
  - startNode: validator-local-1
    type: validator
    imageName: "sonic:local"

  - startNode: validator-local-2
    type: validator
    imageName: "sonic:local"

  - startNode: validator-old
    type: validator
    imageName: "sonic:v2.1.6"

  - runApp: load
    type: counter
    users: 20
    rate:
      constant: 10

  - waitFor: 15s

  - checks:
      - blocksProduced:
          tolerance: 10
      - blockHashes
      - blockHeights:
          tolerance: 5

  # Enable single proposer mode.
  - updateRules:
      Upgrades:
        SingleProposerBlockFormation: true

  - advanceEpoch

  - waitFor: 20s

  - checks:
      - blocksProduced:
          tolerance: 10
      - blockHashes
      - blockHeights:
          tolerance: 5

  - stopApp: load
