Name: Release Features Single Proposer Mixed Versions

Description: >-
  Verifies single proposer mode works correctly with validators
  running different Sonic versions. Block production continues and
  hashes remain consistent across all version combinations.

InitialNetworkRules:
  Upgrades:
    Sonic: true
    Allegro: true
    SingleProposerBlockFormation: false
  Epochs:
    MaxEpochDuration: 1000s

Scenario:
  - startNode: validator-local-1
    type: validator
    imageName: "sonic:local"

  - startNode: validator-local-2
    type: validator
    imageName: "sonic:local"

  - startNode: validator-old
    type: validator
    imageName: "sonic:v2.1.6"

  - runApp: load
    type: counter
    users: 20
    rate:
      constant: 10

  - waitFor: 15s

  - checks:
      - blocksProduced:
          tolerance: 10
      - blockHashes
      - blockHeights:
          tolerance: 5

  # Enable single proposer mode.
  - updateRules:
      Upgrades:
        SingleProposerBlockFormation: true

  - advanceEpoch

  - waitFor: 20s

  - checks:
      - blocksProduced:
          tolerance: 10
      - blockHashes
      - blockHeights:
          tolerance: 5

  - stopApp: load
