# Summary: Validate subsidies compatibility among validators running different client versions.
# Expected outcomes:
# - Validators using different supported images process subsidies traffic concurrently.
# - Nodes remain synchronized while mixed traffic includes subsidized transactions.
# - Block production remains stable throughout execution.

Name: Release Features Subsidies Client Compatibility

InitialNetworkRules:
  Upgrades:
    Sonic: true
    Allegro: true
    GasSubsidies: true

Scenario:
  - startNode: validator-local
    type: validator
    imageName: "sonic:local"
    stake: 4000000

  - startNode: validator-v216
    type: validator
    imageName: "sonic:v2.1.6"
    stake: 3000000

  - runApp: baseline
    type: counter
    users: 20
    rate:
      constant: 15

  - runApp: subsidies-load
    type: subsidies
    users: 10
    rate:
      constant: 10

  - waitFor: 30s

  - checks:
      - blocksProduced:
          tolerance: 10
