Name: Release Features Subsidies Client Compatibility

Description: >-
  Validates subsidies compatibility among validators running different
  client versions. Nodes remain synchronized while processing mixed
  subsidized traffic and block production stays stable.

InitialNetworkRules:
  Upgrades:
    Sonic: true
    Allegro: true
    GasSubsidies: true

Scenario:
  - startNode: validator-local
    type: validator
    imageName: "sonic:local"
    stake: 4000000

  - startNode: validator-v216
    type: validator
    imageName: "sonic:v2.1.6"
    stake: 3000000

  - runApp: baseline
    type: counter
    users: 20
    rate:
      constant: 15

  - runApp: subsidies-load
    type: subsidies
    users: 10
    rate:
      constant: 10

  - waitFor: 30s

  - checks:
      - blocksProduced:
          tolerance: 10
