# Tests that v2.1.5 forks off after GasSubsidies is enabled while v2.1.6
# and local validators retain quorum and keep the network producing blocks.
#
# Expected outcomes:
# - v2.1.5 validator forks and is excluded from consensus after subsidies activation.
# - v2.1.6 and local validators maintain supermajority and block production continues.
# - Subsidies load executes successfully on the surviving network.

Name: Release Features Subsidies Semantic Change v2.1.5 Forks

Description: >-
  Starts a three-version validator set (v2.1.5, v2.1.6, local) with
  GasSubsidies enabled in genesis. The v2.1.5 node does not support the
  subsidies semantic change and forks, while v2.1.6 and local validators
  hold enough stake to maintain quorum and keep block production alive.

InitialNetworkRules:
  Upgrades:
    Sonic: true
    Allegro: true
    GasSubsidies: true

Scenario:
  - startNode: validator-local
    type: validator
    imageName: "sonic:local"
    stake: 5000000

  - startNode: validator-v216
    type: validator
    imageName: "sonic:v2.1.6"
    stake: 4000000

  - startNode: validator-v215
    type: validator
    imageName: "sonic:v2.1.5"
    stake: 1000000
    failing: true

  - runApp: subsidies-load
    type: subsidies
    users: 10
    rate:
      constant: 10

  - waitFor: 30s

  - checks:
      - blocksProduced:
          tolerance: 10
