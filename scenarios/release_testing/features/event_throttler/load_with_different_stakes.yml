Name: Release Features Event Throttler Load With Different Stakes

Description: >-
  Verifies that the event throttler correctly limits event emission
  for minor validators under asymmetric stakes. The dominant validator
  produces the majority of events while minor validators are throttled.

Scenario:
  - startNode: validator-heavy
    type: validator
    imageName: "sonic:local"
    stake: 7000000
    extraArguments: "--event-throttler=true --http.api admin,eth,sonic,txpool,dag" # required for event throttler check

  - startNode: validator-medium
    type: validator
    imageName: "sonic:local"
    stake: 2000000
    extraArguments: "--event-throttler=true --http.api admin,eth,sonic,txpool,dag"

  - startNode: validator-light
    type: validator
    imageName: "sonic:local"
    stake: 1000000
    extraArguments: "--event-throttler=true --http.api admin,eth,sonic,txpool,dag"

  - runApp: load
    type: counter
    users: 30
    rate:
      constant: 15

  - waitFor: 45s

  - checks:
      - blocksProduced:
          tolerance: 10
      - eventThrottled:
          ceiling: 50
          throttledNodes:
            - validator-medium
            - validator-light
      - eventThrottled:
          ceiling: 50
          throttledNodes:
            - validator-heavy
          failing: true
