# Summary: Verify a validator set with mixed stake weights sustains normal load for 60 seconds.
# Expectations:
# - The network remains online and continues producing blocks for the full 60 seconds.
# - Validators with different stake values participate without causing liveness issues.

Name: Release Validators Mixed Stakes

Scenario:
  - startNode: validator-heavy
    type: validator
    stake: 7000000

  - startNode: validator-medium
    type: validator
    stake: 2000000

  - startNode: validator-light
    type: validator
    stake: 1000000

  - runApp: normal
    type: counter
    users: 10
    rate:
      constant: 10

  - waitFor: 60s

