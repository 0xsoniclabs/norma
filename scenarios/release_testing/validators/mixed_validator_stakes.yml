Name: Release Validators Mixed Stakes

Description: >-
  Verifies a validator set with mixed stake weights sustains normal
  load for 60 seconds without causing liveness issues.

Scenario:
  - startNode: validator-heavy
    type: validator
    stake: 7000000

  - startNode: validator-medium
    type: validator
    stake: 2000000

  - startNode: validator-light
    type: validator
    stake: 1000000

  - runApp: normal
    type: counter
    users: 10
    rate:
      constant: 10

  - waitFor: 60s

