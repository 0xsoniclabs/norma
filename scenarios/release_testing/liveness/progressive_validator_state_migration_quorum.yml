# Summary: Verify liveness while progressively migrating four validators from v2.1.6 to local without undelegation.
# Expected outcomes:
# - Each validator restarts as sonic:local using its persisted data volume.
# - No undelegation is performed during migration.
# - Block production continues throughout every stop/restart window.

Name: Liveness Progressive Validator State Migration Quorum

Scenario:
  - startNode: validator-1
    type: validator
    imageName: "sonic:v2.1.6"
    dataVolume: validator-1-data
    stake: 2500000

  - startNode: validator-2
    type: validator
    imageName: "sonic:v2.1.6"
    dataVolume: validator-2-data
    stake: 2500000

  - startNode: validator-3
    type: validator
    imageName: "sonic:v2.1.6"
    dataVolume: validator-3-data
    stake: 2500000

  - startNode: validator-4
    type: validator
    imageName: "sonic:v2.1.6"
    dataVolume: validator-4-data
    stake: 2500000

  - runApp: migration-load
    type: counter
    users: 20
    rate:
      constant: 20

  - waitFor: 20s

  - stopNode: validator-1
  - waitFor: 15s
  - checks:
      - blocksProduced:
          tolerance: 10
  - startNode: validator-1
    type: validator
    imageName: "sonic:local"
    dataVolume: validator-1-data
  - waitFor: 15s
  - checks:
      - blocksProduced:
          tolerance: 10

  - stopNode: validator-2
  - waitFor: 15s
  - checks:
      - blocksProduced:
          tolerance: 10
  - startNode: validator-2
    type: validator
    imageName: "sonic:local"
    dataVolume: validator-2-data
  - waitFor: 15s
  - checks:
      - blocksProduced:
          tolerance: 10

  - stopNode: validator-3
  - waitFor: 15s
  - checks:
      - blocksProduced:
          tolerance: 10
  - startNode: validator-3
    type: validator
    imageName: "sonic:local"
    dataVolume: validator-3-data
  - waitFor: 15s
  - checks:
      - blocksProduced:
          tolerance: 10

  - stopNode: validator-4
  - waitFor: 15s
  - checks:
      - blocksProduced:
          tolerance: 10
  - startNode: validator-4
    type: validator
    imageName: "sonic:local"
    dataVolume: validator-4-data
  - waitFor: 15s
  - checks:
      - blocksProduced:
          tolerance: 10
