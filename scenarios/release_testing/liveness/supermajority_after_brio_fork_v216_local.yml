Name: Liveness Supermajority After Brio Fork v2.1.6 Local

Description: >-
  Verifies supermajority liveness across a mixed v2.1.6/local
  validator set when Brio is enabled. The sonic:local supermajority
  keeps the network online while Brio-era load executes.

InitialNetworkRules:
  Upgrades:
    Sonic: true
    Allegro: true
    Brio: false

Scenario:
  - startNode: validator-local
    type: validator
    imageName: "sonic:local"
    stake: 7000000

  - startNode: validator-v216
    type: validator
    imageName: "sonic:v2.1.6"
    stake: 3000000
    failing: true

  - runApp: baseline
    type: counter
    users: 20
    rate:
      constant: 20

  - waitFor: 20s

  - updateRules:
      Upgrades:
        Brio: true

  - waitForEpoch

  - runApp: brio-large-contract
    type: largecontract
    users: 10
    rate:
      constant: 6

  - waitFor: 40s

  - checks:
      - blocksProduced:
          tolerance: 10
