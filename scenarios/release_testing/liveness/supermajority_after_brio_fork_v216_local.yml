# Summary: Verify supermajority liveness across a mixed v2.1.6/local validator set when Brio is enabled.
# Expected outcomes:
# - After Brio activation, the v2.1.6 validator can fork/fail as expected.
# - The sonic:local supermajority keeps the network online.
# - Brio-era load executes while block production continues.

Name: Liveness Supermajority After Brio Fork v2.1.6 Local

InitialNetworkRules:
  Upgrades:
    Sonic: true
    Allegro: true
    Brio: false

Scenario:
  - startNode: validator-local
    type: validator
    imageName: "sonic:local"
    stake: 7000000

  - startNode: validator-v216
    type: validator
    imageName: "sonic:v2.1.6"
    stake: 3000000
    failing: true

  - runApp: baseline
    type: counter
    users: 20
    rate:
      constant: 20

  - waitFor: 20s

  - updateRules:
      Upgrades:
        Brio: true

  - runApp: brio-large-contract
    type: largecontract
    users: 10
    rate:
      constant: 6

  - waitFor: 40s

  - checks:
      - blocksProduced:
          tolerance: 10
