# This test scenario checks that the network can stall and recover from
# a temporary loss of supermajority.
# Expectations:
# - Network stalls when a supermajority of validators go offline.
# - Network recovers when a validator rejoins with the same key and data directory.
# - Block production continues after recovery.
# - Load applications can continue to operate after recovery.
name: Liveness Blackout Allegro

duration: 90

validators:
  - name: base-local
    imagename: "sonic:local"

network_rules:
  genesis:
    UPGRADES_SONIC: true
    UPGRADES_ALLEGRO: true
    MAX_EPOCH_DURATION: 1000s # only manual epoch

nodes:
  - name: validator-going-offline
    start: 10
    leave: 30
    client:
      imagename: "sonic:v2.1.6"
      type: validator
      val_id: 2
  
  - name: validator-rejoining
    rejoin: 60
    client:
      imagename: "sonic:v2.1.6"
      type: validator
      val_id: 2

advance_epoch:
  - time: 11    

checks:
  - time: 59
    check: blocks_rolling
    config:
      failing: true
      start: 40

applications:
  # Pre-blackout activity.
  - name: pre-blackout-load
    type: counter
    end: 25
    users: 20
    rate:
      constant: 10

  # Resume activity only after recovery to avoid blackout log spam.
  - name: post-blackout-load
    type: counter
    start: 70
    users: 20
    rate:
      constant: 10
