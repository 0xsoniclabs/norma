Name: Release Stress Multi Node Mix Payload Constant

Description: >-
  Multi-validator stress test with mixed transaction payloads
  (counter, erc20, uniswap) at constant rates. The network remains
  live under sustained mixed load.

Scenario:
  - startNode: validator-old
    type: validator
    imageName: "sonic:v2.1.6"

  - startNode: validators
    type: validator
    imageName: "sonic:local"
    instances: 3

  - runApp: counter-constant
    type: counter
    users: 80
    rate:
      constant: 20

  - runApp: erc20-constant
    type: erc20
    users: 80
    rate:
      constant: 20

  - runApp: uniswap-constant
    type: uniswap
    users: 80
    rate:
      constant: 20

  - waitFor: 90s

  - checks:
      - blocksProduced:
          tolerance: 10
