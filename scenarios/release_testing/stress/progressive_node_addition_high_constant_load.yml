# Summary: Progressive stress test under high constant load while validators are incorporated over time.
# Expected outcomes:
# - The network starts under high sustained mixed load.
# - Additional validators join progressively with observation windows between joins.
# - Block production remains active throughout the progressive scaling sequence.

Name: Release Stress Progressive Node Addition High Constant Load

Scenario:
  - startNode: validator-0
    type: validator
    imageName: "sonic:local"

  - runApp: counter-high
    type: counter
    users: 120
    rate:
      constant: 30

  - runApp: erc20-high
    type: erc20
    users: 120
    rate:
      constant: 30

  - waitFor: 30s

  - startNode: validator-1
    type: validator
    imageName: "sonic:local"

  - waitFor: 30s

  - startNode: validator-2
    type: validator
    imageName: "sonic:local"

  - waitFor: 30s

  - startNode: validator-3
    type: validator
    imageName: "sonic:local"

  - waitFor: 30s
