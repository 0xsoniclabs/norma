Name: Release Stress Single Node Single Bundle Slope

Description: >-
  Single-validator stress test with subsidized bundle traffic and
  sloping load. Transaction bundles remain active with required
  upgrades enabled at genesis.

InitialNetworkRules:
  Upgrades:
    Sonic: true
    Allegro: true
    GasSubsidies: true
    Brio: true
    TransactionBundles: true

Scenario:
  - startNode: validator-0
    type: validator
    imageName: "sonic:local"

  - runApp: bundles-slope
    type: subsidizedbundle
    users: 50
    rate:
      slope:
        start: 10
        increment: 2

  - waitFor: 60s