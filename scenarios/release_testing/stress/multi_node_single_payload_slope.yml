Name: Release Stress Multi Node Single Payload Slope

Description: >-
  Multi-validator stress test with one transaction payload and
  sloping load. The network remains live while throughput pressure
  increases.

Scenario:
  - startNode: validator-old
    type: validator
    imageName: "sonic:v2.1.6"

  - startNode: validators
    type: validator
    imageName: "sonic:local"
    instances: 3

  - runApp: erc20-slope
    type: erc20
    users: 100
    rate:
      slope:
        start: 20
        increment: 5

  - waitFor: 90s

  - checks:
      - blocksProduced:
          tolerance: 10
