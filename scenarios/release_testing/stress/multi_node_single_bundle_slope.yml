# Summary: Multi-validator stress test with subsidized bundle traffic and sloping load.
# Expected outcomes:
# - A mixed-version validator set sustains rising subsidized bundle traffic.
# - The network remains live while throughput pressure increases.

Name: Release Stress Multi Node Single Bundle Slope

InitialNetworkRules:
  Upgrades:
    Sonic: true
    Allegro: true
    GasSubsidies: true
    Brio: true
    TransactionBundles: true

Scenario:
  - startNode: validator-old
    type: validator
    imageName: "sonic:v2.1.6"

  - startNode: validators
    type: validator
    imageName: "sonic:local"
    instances: 3

  - runApp: bundles-slope
    type: subsidizedbundle
    users: 100
    rate:
      slope:
        start: 20
        increment: 5

  - waitFor: 90s