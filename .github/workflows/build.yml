name: Build

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Norma
    runs-on: self-hosted
    timeout-minutes: 120
    env:
      DOCKER_API_VERSION: "1.45"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Make Norma
        run: |
          make clean
          make all