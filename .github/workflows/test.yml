name: Test

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: self-hosted
    timeout-minutes: 180
    env:
      DOCKER_API_VERSION: "1.45"
      GOMEMLIMIT: 60GiB
      GOCACHE: ${{ github.workspace }}/.cache/go-build
      TMPDIR: /tmp

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Pre Clean-up
        run: go run ./driver/norma purge

      - name: Test Norma (genesis)
        run: cd genesis && go test ./...

      - name: Test Norma
        run: go test ./... -p 2 --parallel 2 --timeout 30m

      - name: Post Clean-up
        if: ${{ always() }}
        run: go run ./driver/norma purge